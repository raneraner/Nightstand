<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>מנורת לילה</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* דוחף את הפאנל לתחתית */
            align-items: center;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            touch-action: none;
            padding-bottom: 40px; /* מרווח בטיחות תחתון לאייפון */
        }

        .vader-scene {
            position: absolute;
            top: 0;
            width: 100%;
            height: 85vh; /* תופס 85% מהמסך העליון */
            display: flex;
            justify-content: center;
            align-items: center;
            mix-blend-mode: screen;
            z-index: 1;
        }

        /* עטיפה השומרת על הפרופורציות. קריטי כדי שהחרב תישאר במקום */
        .image-wrapper {
            position: relative;
            height: 100%;
            display: inline-flex;
        }

        .vader-image {
            height: 100%;
            width: auto;
            object-fit: contain;
            filter: brightness(20%) contrast(130%);
        }

        /* חרב האור - ממוקמת ומסובבת בדיוק על החרב המקורית */
        .lightsaber-warm {
            position: absolute;
            bottom: 14%; /* גובה החרב */
            left: 54%; /* מיקום אופקי */
            width: 5px;
            height: 52%; /* אורך החרב */
            background-color: #ffd700;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 1), 0 0 60px rgba(255, 165, 0, 1), 0 0 120px rgba(255, 165, 0, 1);
            transform: rotate(53deg); /* זווית החפיפה */
            transform-origin: bottom center;
            transition: box-shadow 0.2s ease;
            opacity: 1;
        }

        .controls {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 20px; /* פאנל קומפקטי יותר */
            border-radius: 15px;
            backdrop-filter: blur(10px);
            text-align: center;
            width: 85%;
            max-width: 350px;
            color: #fff;
            z-index: 10;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: bold;
        }
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
        }
        #status {
            margin-top: 10px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="vader-scene">
        <div class="image-wrapper">
            <img src="image_4.png" class="vader-image" alt="Darth Vader">
            <div class="lightsaber-warm"></div>
        </div>
    </div>

    <div class="controls">
        <label for="brightness">עוצמת מנורת לילה</label>
        <input type="range" id="brightness" min="0.5" max="100" value="100">
        <div id="status">גע במסך כדי למנוע כיבוי</div>
    </div>

    <script>
        const brightnessSlider = document.getElementById('brightness');
        const vaderImage = document.querySelector('.vader-image');
        const lightsaber = document.querySelector('.lightsaber-warm');
        const statusText = document.getElementById('status');
        let wakeLock = null;

        brightnessSlider.addEventListener('input', (e) => {
            const val = e.target.value / 100;
            const glow = `
                0 0 30px rgba(255, 215, 0, ${val}), 
                0 0 60px rgba(255, 165, 0, ${val}), 
                0 0 120px rgba(255, 165, 0, ${val})
            `;
            lightsaber.style.boxShadow = glow;
            vaderImage.style.filter = `brightness(${20 + 15 * val}%) contrast(130%)`; 
        });

        async function requestWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                statusText.innerText = 'מצב שינה בוטל - המסך יישאר דלוק';
            } catch (err) {
                statusText.innerText = 'לא ניתן לחסום את כיבוי המסך';
            }
        }

        document.addEventListener('click', () => {
            if (!wakeLock) {
                requestWakeLock();
            }
        }, { once: true });

        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });
    </script>
</body>
</html>
