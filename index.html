<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>מנורת לילה דארת ויידר</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
            padding-bottom: 40px; 
        }

        .vader-scene {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            mix-blend-mode: screen;
            z-index: 1;
            max-height: 80vh;
            overflow: hidden;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            display: block;
            line-height: 0; /* מונע רווחים שקופים מתחת לתמונה */
        }

        .vader-image {
            display: block;
            width: 100%;
            height: auto;
            filter: brightness(20%) contrast(130%);
            transition: filter 0.1s ease;
        }

        .lightsaber-warm {
            position: absolute;
            /* נעץ המיקום - ידית החרב */
            bottom: 15%; /* גובה מתחתית התמונה (שחק עם זה מעלה-מטה) */
            left: 52%;   /* מרחק משמאל (שחק עם זה ימינה-שמאלה) */
            
            width: 1.5%; /* עובי החרב באחוזים */
            height: 60%; /* אורך החרב באחוזים */
            
            background-color: #ffd700;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 1), 0 0 40px rgba(255, 165, 0, 1), 0 0 80px rgba(255, 165, 0, 1);
            
            transform-origin: bottom center; /* קריטי: הסיבוב מחושב מתחתית החרב */
            transform: rotate(52deg); /* זווית ההטיה (שחק עם זה לשיפוע) */
            
            opacity: 1;
            z-index: 2;
            pointer-events: none;
            transition: opacity 0.1s linear, box-shadow 0.1s linear;
        }

        .controls {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            text-align: center;
            width: 85%;
            max-width: 350px;
            color: #fff;
            z-index: 10;
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: bold;
        }
        
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
        }
        
        #status {
            margin-top: 10px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="vader-scene">
        <div class="image-wrapper">
            <img src="image_4.png" class="vader-image" alt="Darth Vader">
            <div class="lightsaber-warm"></div>
        </div>
    </div>

    <div class="controls">
        <label for="brightness">עוצמת מנורת לילה</label>
        <input type="range" id="brightness" min="0" max="100" value="100">
        <div id="status">מצב שינה בוטל - המסך יישאר דלוק</div>
    </div>

    <script>
        const brightnessSlider = document.getElementById('brightness');
        const vaderImage = document.querySelector('.vader-image');
        const lightsaber = document.querySelector('.lightsaber-warm');
        let wakeLock = null;

        // דימר שמוריד הכל לחושך מוחלט בצורה חלקה
        brightnessSlider.addEventListener('input', (e) => {
            const val = e.target.value / 100;

            const glow = `
                0 0 20px rgba(255, 215, 0, ${val}), 
                0 0 40px rgba(255, 165, 0, ${val}), 
                0 0 80px rgba(255, 165, 0, ${val})
            `;
            lightsaber.style.boxShadow = glow;
            lightsaber.style.opacity = val;
            vaderImage.style.filter = `brightness(${val * 20}%) contrast(130%)`; 
        });

        async function requestWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) {
                console.log('Wake Lock error');
            }
        }

        document.addEventListener('click', () => {
            if (!wakeLock) requestWakeLock();
        }, { once: true });

        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });
    </script>
</body>
</html>
