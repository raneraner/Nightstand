<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>מנורת לילה דארת ויידר</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100dvh; /* גובה דינמי שמונע חיתוך במסך מלא */
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
            /* מרווח בטיחות תחתון ייעודי לאייפון ועוד תוספת קטנה */
            padding-bottom: calc(env(safe-area-inset-bottom) + 40px); 
        }

        .vader-scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 80dvh; /* מותאם לגובה הדינמי */
            display: flex;
            justify-content: center;
            align-items: flex-end; 
            mix-blend-mode: screen;
            overflow: hidden;
        }

        .image-wrapper {
            position: relative;
            height: 100%; 
            display: inline-block;
        }

        .vader-image {
            display: block;
            height: 100%;
            width: auto;
            filter: brightness(20%) contrast(130%);
            transition: filter 0.1s ease;
        }

        /* הקואורדינטות המדויקות שלך נשמרו */
        .lightsaber-warm {
            position: absolute;
            bottom: 17.5%; 
            left: 50%; 
            
            width: 2%; 
            height: 55%; 
            
            background-color: #ffd700; /* ברירת מחדל: צהוב */
            border-radius: 10px;
            /* הילה ראשונית (תתעדכן ב-JS) */
            box-shadow: 0 0 20px rgba(255, 215, 0, 1), 0 0 40px rgba(255, 165, 0, 1), 0 0 80px rgba(255, 165, 0, 1);
            
            transform-origin: bottom center; 
            transform: rotate(41deg); 
            
            opacity: 1;
            z-index: 2;
            pointer-events: none;
            transition: background-color 0.2s, box-shadow 0.1s;
        }

        .controls {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            text-align: center;
            width: 85%;
            max-width: 350px;
            color: #fff;
            z-index: 10;
            margin-bottom: 20px; 
            transition: opacity 0.5s ease;
            opacity: 1;
        }

        .controls.hidden {
            opacity: 0;
            pointer-events: none; 
        }
        
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            margin-bottom: 15px; /* מרווח בין הסליידר לכפתורים */
        }
        
        /* מכלול לכפתורים בתחתית הפאנל */
        .buttons-container {
            display: flex;
            justify-content: space-around; /* פיזור שווה */
            align-items: center;
            width: 100%;
        }

        /* כפתור החלפת צבע (עיגול ללא כיתוב) */
        #color-toggle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #fff; /* מסגרת לבנה */
            cursor: pointer;
            background-color: #ff0000; /* ברירת מחדל: אדום (החרב צהובה) */
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transition: background-color 0.2s;
        }

        /* כפתור נעילת מסך (הוזז הצידה) */
        #status {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            user-select: none;
            padding: 5px;
        }
    </style>
</head>
<body>

    <div class="vader-scene">
        <div class="image-wrapper">
            <img src="image_4.png" class="vader-image" alt="Darth Vader">
            <div class="lightsaber-warm"></div>
        </div>
    </div>

    <div class="controls" id="controls-panel">
        <input type="range" id="brightness" min="0" max="100" value="100" dir="ltr">
        
        <div class="buttons-container">
            <div id="status">נעילת מסך ✅</div>
            <div id="color-toggle" title="החלף צבע חרב"></div>
        </div>
    </div>

    <script>
        const brightnessSlider = document.getElementById('brightness');
        const vaderImage = document.querySelector('.vader-image');
        const lightsaber = document.querySelector('.lightsaber-warm');
        const statusText = document.getElementById('status');
        const colorToggle = document.getElementById('color-toggle');
        const controlsPanel = document.getElementById('controls-panel');
        let wakeLock = null;
        let hideTimeout = null;
        let currentColorMode = 'warm'; // מצב נוכחי: warm (צהוב) או red (אדום)

        // מנגנון עלטת פאנל
        function resetHideTimer() {
            controlsPanel.classList.remove('hidden');
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                controlsPanel.classList.add('hidden');
            }, 4000);
        }

        document.addEventListener('touchstart', resetHideTimer);
        document.addEventListener('mousemove', resetHideTimer);
        document.addEventListener('click', resetHideTimer);

        resetHideTimer();

        // פונקציה מאוחדת לעדכון סגנון החרב (צבע, בהירות, הילה)
        function applyStyleSettings() {
            const val = brightnessSlider.value / 100;
            let shadows = '';

            if (currentColorMode === 'warm') {
                // מצב צהוב-חם
                lightsaber.style.backgroundColor = '#ffd700';
                shadows = `
                    0 0 20px rgba(255, 215, 0, ${val}), 
                    0 0 40px rgba(255, 165, 0, ${val}), 
                    0 0 80px rgba(255, 165, 0, ${val})
                `;
            } else {
                // מצב אדום (שומר על תכונות הילה דומות)
                lightsaber.style.backgroundColor = '#ff0000';
                shadows = `
                    0 0 20px rgba(255, 0, 0, ${val}), 
                    0 0 40px rgba(200, 0, 0, ${val}), 
                    0 0 80px rgba(150, 0, 0, ${val})
                `;
            }

            lightsaber.style.boxShadow = shadows;
            lightsaber.style.opacity = val;
            // עמעום התמונה המקורית כדי להעלים את החרב האדומה
            vaderImage.style.filter = `brightness(${val * 20}%) contrast(130%)`; 
        }

        // מאזין לסליידר
        brightnessSlider.addEventListener('input', applyStyleSettings);

        // מאזין לכפתור הצבע
        colorToggle.addEventListener('click', (e) => {
            e.stopPropagation(); // מונע מנגיעה לאפס את הטיימר באופן כפול
            
            if (currentColorMode === 'warm') {
                currentColorMode = 'red';
                // חרב אדומה -> כפתור צהוב
                colorToggle.style.backgroundColor = '#ffd700'; 
            } else {
                currentColorMode = 'warm';
                // חרב צהובה -> כפתור אדום
                colorToggle.style.backgroundColor = '#ff0000';
            }
            
            applyStyleSettings(); // עדכן את החרב
            resetHideTimer(); // וודא שהפאנל לא נעלם מיד
        });

        // מנגנון נעילת מסך
        async function requestWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                statusText.innerText = 'נעילת מסך ❌';
                
                wakeLock.addEventListener('release', () => {
                    wakeLock = null;
                    statusText.innerText = 'נעילת מסך ✅';
                });
            } catch (err) {
                console.log('Wake Lock error');
            }
        }

        statusText.addEventListener('click', async (e) => {
            e.stopPropagation(); 
            if (wakeLock !== null) {
                await wakeLock.release();
            } else {
                await requestWakeLock();
            }
            resetHideTimer(); // וודא שהפאנל לא נעלם מיד
        });

        document.addEventListener('click', (e) => {
            if (!wakeLock && e.target.id !== 'status' && e.target.id !== 'color-toggle') {
                requestWakeLock();
            }
        }, { once: true });

        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });

        // הפעל ראשונית של הסגנון
        applyStyleSettings();

    </script>
</body>
</html>
