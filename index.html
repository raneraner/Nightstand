<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מנורת לילה דארת ויידר</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000; /* שחור מוחלט */
            transition: all 0.2s ease;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* מכלול הסצנה של ויידר */
        .vader-scene {
            position: relative;
            width: 80%;
            max-width: 400px; /* כדי שלא יתפרש יותר מדי באייפד */
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 60px;
        }

        /* תמונת דארת ויידר */
        .vader-image {
            width: 100%;
            height: auto;
            /* הפכנו את התמונה לצללית עם פרטים כהים */
            filter: brightness(10%) opacity(90%); 
            transition: all 0.2s ease;
        }

        /* החרב האור המעודכנת - הילה חזקה בהרבה */
        .lightsaber-warm {
            position: absolute;
            top: 61%; /* ממוקמת ביד */
            left: 23%; /* ממוקמת ביד */
            width: 4px;
            height: 32%; /* אורכה של החרב */
            background-color: #ffd700; /* צבע זהב/ענבר חם לליבה */
            border-radius: 4px;
            /* הילה חמה רב-שכבתית וחזקה משמעותית - ערכים מוגדלים */
            box-shadow: 0 0 25px rgba(255, 215, 0, 1), 0 0 50px rgba(255, 165, 0, 1), 0 0 100px rgba(255, 165, 0, 1), 0 0 160px rgba(255, 165, 0, 1);
            transform: rotate(11deg); /* זווית שתתאים ליד */
            transition: box-shadow 0.2s ease; /* אני משאיר transition רק ל-box-shadow */
            opacity: 1; /* החרב (הליבה) עצמה נשארת מלאה */
        }

        .controls {
            background: rgba(255, 255, 255, 0.1); /* פאנל בהיר קל על רקע שחור */
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
            width: 80%;
            max-width: 300px;
            color: #fff; /* צבע טקסט לבן */
        }
        label {
            display: block;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
        }
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.3); /* סליידר שקוף למחצה */
            outline: none;
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="vader-scene">
        <img src="image_4.png" class="vader-image" alt="Darth Vader">
        <div class="lightsaber-warm"></div>
    </div>

    <div class="controls">
        <label for="brightness">עוצמת אור מנורת הלילה</label>
        <input type="range" id="brightness" min="0.5" max="100" value="100">
        <div id="status">גע במסך כדי למנוע כיבוי</div>
    </div>

    <script>
        const brightnessSlider = document.getElementById('brightness');
        const vaderImage = document.querySelector('.vader-image');
        const lightsaber = document.querySelector('.lightsaber-warm');
        const statusText = document.getElementById('status');
        let wakeLock = null;

        // ויסות בהירות - שולט על עוצמת ההילה (Box-Shadow) בלבד
        brightnessSlider.addEventListener('input', (e) => {
            const val = e.target.value / 100;

            // הגדרת הילה חזקה ב-JS לשליטה בשקיפות
            // אני משתמש ב-Template Literal כדי לשנות את ה-opacity (ה-val) של כל שכבה
            const glow = `
                0 0 25px rgba(255, 215, 0, ${val}), 
                0 0 50px rgba(255, 165, 0, ${val}), 
                0 0 100px rgba(255, 165, 0, ${val}), 
                0 0 160px rgba(255, 165, 0, ${val})
            `;
            lightsaber.style.boxShadow = glow;

            // שינוי קל בבהירות הצללית כדי שתרגיש קצת יותר מוארת כשההילה גבוהה
            const vaderBrightness = 10 + 15 * val;
            vaderImage.style.filter = `brightness(${vaderBrightness}%) opacity(90%)`; 
        });

        // פונקציה למניעת כיבוי מסך
        async function requestWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                statusText.innerText = 'מצב שינה בוטל - המסך יישאר דלוק';
            } catch (err) {
                statusText.innerText = 'לא ניתן לחסום את כיבוי המסך';
            }
        }

        // האייפון דורש אינטראקציה ראשונית של המשתמש כדי לאשר פעולות רקע
        document.addEventListener('click', () => {
            if (!wakeLock) {
                requestWakeLock();
            }
        }, { once: true });

        // חידוש החסימה אם המשתמש יוצא מהדפדפן וחוזר
        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });
    </script>
</body>
</html>
