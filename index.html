<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מנורת לילה דארת ויידר</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #030303; /* כמעט שחור לחלוטין */
            transition: background-color 0.2s ease;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
            color: #fff;
        }

        /* מכלול הסצנה במרכז */
        .scene-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px; /* קצת יותר קרוב לסליידר */
            position: relative;
        }

        /* דארת ויידר - דורש פונט תואם, או תמונה, אבל כאן ניצור אותו ב-CSS/פונט כדי לשמור על קובץ בודד */
        .vader-display {
            font-size: 200px; /* גודל גדול */
            position: relative;
            line-height: 1;
            user-select: none;
            cursor: default;
        }

        /* חרב אור בצבע אור חם - כתום/זהב */
        .lightsaber-v2 {
            width: 15px;
            height: 250px;
            background-color: #ff9f00; /* צבע אור חם, כתום-זהב */
            border-radius: 10px;
            position: absolute;
            bottom: -30px; /* ממוקמת ב"יד" */
            left: 20px; /* ממוקמת ב"יד" */
            /* ההילה החמה החזקה - מקור האור */
            box-shadow: 0 0 30px #ff9f00, 0 0 50px #ff9f00, 0 0 70px #ff9f00, 0 0 100px #ff9f00;
            opacity: 1; /* אטימות מלאה כברירת מחדל */
            transition: opacity 0.2s ease;
        }

        .controls {
            background: rgba(10, 10, 10, 0.8); /* קצת יותר אטימות כדי שייראה על רקע שחור */
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
            width: 80%;
            max-width: 350px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        label {
            display: block;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #fff; /* צבע טקסט לבן */
        }
        input[type="range"] {
            width: 100%;
            height: 12px; /* קצת יותר עבה */
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2); /* סליידר שקוף למחצה */
            outline: none;
            -webkit-appearance: none; /* מסיר עיצוב ברירת מחדל */
        }
        
        /* עיצוב ידית הסליידר (Apple Style) */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        #status {
            margin-top: 25px;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.8);
            opacity: 1; /* מוצג תמיד */
        }
    </style>
</head>
<body>

    <div class="scene-container">
        <div class="vader-display">&#129497;</div> <div class="lightsaber-v2"></div>
    </div>

    <div class="controls">
        <label for="brightness">בהירות מנורה</label>
        <input type="range" id="brightness" min="0.5" max="100" value="100">
        <div id="status">המסך יישאר דלוק (גע כדי להפעיל)</div>
    </div>

    <script>
        const brightnessSlider = document.getElementById('brightness');
        const lightsaber = document.querySelector('.lightsaber-v2');
        const statusText = document.getElementById('status');
        let wakeLock = null;

        // ויסות בהירות
        brightnessSlider.addEventListener('input', (e) => {
            const opacity = e.target.value / 100;
            // שינוי אטימות החרב וההילה יחד
            lightsaber.style.opacity = opacity;
            
            // שינוי קל של צבע הרקע לפי עוצמת האור כדי ליצור אפקט "מאיר את החדר"
            // העוצמה המקסימלית תיתן רקע בהיר מאוד של אור חם
            const backgroundLight = 255 * (e.target.value / 100);
            document.body.style.backgroundColor = `rgba(255, 159, 0, ${opacity * 0.1})`; // 10% עוצמה מקסימלית לרקע
        });

        // פונקציה למניעת כיבוי מסך
        async function requestWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                statusText.innerText = 'מצב שינה בוטל - המסך יישאר דלוק';
            } catch (err) {
                statusText.innerText = 'לא ניתן לחסום את כיבוי המסך';
            }
        }

        // האייפון דורש אינטראקציה ראשונית של המשתמש כדי לאשר פעולות רקע
        document.addEventListener('click', () => {
            if (!wakeLock) {
                requestWakeLock();
            }
        }, { once: true });

        // חידוש החסימה אם המשתמש יוצא מהדפדפן וחוזר
        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });
    </script>
</body>
</html>
