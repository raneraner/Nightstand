<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>מנורת לילה דארת ויידר</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
            padding-bottom: 40px; 
        }

        .vader-scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: flex-end; 
            mix-blend-mode: screen;
            overflow: hidden;
        }

        .image-wrapper {
            position: relative;
            height: 100%; 
            display: inline-block;
        }

        .vader-image {
            display: block;
            height: 100%;
            width: auto;
            filter: brightness(20%) contrast(130%);
            transition: filter 0.1s ease;
        }

        .lightsaber-warm {
            position: absolute;
            bottom: 17.5%; 
            left: 50%; 
            
            width: 2%; 
            height: 55%; 
            
            background-color: #ffd700;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 1), 0 0 40px rgba(255, 165, 0, 1), 0 0 80px rgba(255, 165, 0, 1);
            
            transform-origin: bottom center; 
            transform: rotate(41deg); 
            
            opacity: 1;
            z-index: 2;
            pointer-events: none;
        }

        .controls {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            text-align: center;
            width: 85%;
            max-width: 350px;
            color: #fff;
            z-index: 10;
            margin-bottom: 20px; 
            /* הוספת אנימציית העלמה חלקה */
            transition: opacity 0.5s ease;
            opacity: 1;
        }

        /* מחלקה שנוספת כשצריך להעלים את הפאנל */
        .controls.hidden {
            opacity: 0;
            pointer-events: none; /* מונע לחיצות בטעות כשהפאנל מוסתר */
        }
        
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
        }
        
        #status {
            margin-top: 15px;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            user-select: none;
            padding: 5px;
        }
    </style>
</head>
<body>

    <div class="vader-scene">
        <div class="image-wrapper">
            <img src="image_4.png" class="vader-image" alt="Darth Vader">
            <div class="lightsaber-warm"></div>
        </div>
    </div>

    <div class="controls" id="controls-panel">
        <input type="range" id="brightness" min="0" max="100" value="100" dir="ltr">
        <div id="status">נעילת מסך ✅</div>
    </div>

    <script>
        const brightnessSlider = document.getElementById('brightness');
        const vaderImage = document.querySelector('.vader-image');
        const lightsaber = document.querySelector('.lightsaber-warm');
        const statusText = document.getElementById('status');
        const controlsPanel = document.getElementById('controls-panel');
        let wakeLock = null;
        let hideTimeout = null;

        // מנגנון העלמת הפאנל
        function resetHideTimer() {
            // הצג את הפאנל
            controlsPanel.classList.remove('hidden');
            
            // נקה את הטיימר הקודם
            clearTimeout(hideTimeout);
            
            // התחל ספירה מחדש של 4 שניות
            hideTimeout = setTimeout(() => {
                controlsPanel.classList.add('hidden');
            }, 4000);
        }

        // האזנה לכל מגע או תזוזה על המסך כדי לאפס את הטיימר
        document.addEventListener('touchstart', resetHideTimer);
        document.addEventListener('mousemove', resetHideTimer);
        document.addEventListener('click', resetHideTimer);

        // הפעלת הטיימר ברגע שהדף נטען
        resetHideTimer();

        // שליטה בבהירות
        brightnessSlider.addEventListener('input', (e) => {
            const val = e.target.value / 100;

            const glow = `
                0 0 20px rgba(255, 215, 0, ${val}), 
                0 0 40px rgba(255, 165, 0, ${val}), 
                0 0 80px rgba(255, 165, 0, ${val})
            `;
            lightsaber.style.boxShadow = glow;
            lightsaber.style.opacity = val;
            vaderImage.style.filter = `brightness(${val * 20}%) contrast(130%)`; 
        });

        // מנגנון נעילת מסך
        async function requestWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                statusText.innerText = 'נעילת מסך ❌';
                
                wakeLock.addEventListener('release', () => {
                    wakeLock = null;
                    statusText.innerText = 'נעילת מסך ✅';
                });
            } catch (err) {
                console.log('Wake Lock error');
            }
        }

        statusText.addEventListener('click', async (e) => {
            e.stopPropagation(); // מונע מנגיעה בכפתור לאפס דברים אחרים בטעות
            if (wakeLock !== null) {
                await wakeLock.release();
            } else {
                await requestWakeLock();
            }
        });

        document.addEventListener('click', (e) => {
            if (!wakeLock && e.target.id !== 'status') {
                requestWakeLock();
            }
        }, { once: true });

        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });
    </script>
</body>
</html>
